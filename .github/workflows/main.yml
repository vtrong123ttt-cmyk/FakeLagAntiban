name: Build-FF-iOS
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential perl git curl libssl-dev xz-utils
          export THEOS=~/theos
          git clone --recursive --depth 1 https://github.com/theos/theos.git $THEOS
          
      - name: Setup iOS SDK
        run: |
          export THEOS=~/theos
          rm -rf $THEOS/sdks
          git clone --depth 1 https://github.com/theos/sdks.git $THEOS/sdks
          
      - name: Setup Toolchain (Link Direct 100%)
        run: |
          export THEOS=~/theos
          mkdir -p $THEOS/toolchain/linux/iphone
          # Tai Toolchain tu sbingner - Cuc ky on dinh cho Linux
          curl -L "https://github.com/sbingner/llvm-project/releases/download/v10.0.0-1/linux-ios-arm64e-clang-toolchain.tar.lzma" -o toolchain.tar.lzma
          # Giai nen tar.lzma
          tar -xf toolchain.tar.lzma -C $THEOS/toolchain/linux/iphone
          rm toolchain.tar.lzma
          
      - name: Compile Tweak
        run: |
          export THEOS=~/theos
          # Lenh nay de may chu hieu duong dan Toolchain moi
          export PATH=$THEOS/toolchain/linux/iphone/bin:$PATH
          make package
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hack-FF-Thanh-Pham
          path: packages/*.deb
