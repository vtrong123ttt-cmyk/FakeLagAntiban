name: Build
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: macos-12
    steps:
      - uses: actions/checkout@v3
      - name: Install Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
      - name: Build Tweak
        run: |
          export THEOS=~/theos
          make package
      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: FakeLag-File
          path: packages/*.deb
