name: Build-FF-iOS
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential perl git curl libssl-dev
          export THEOS=~/theos
          git clone --recursive --depth 1 https://github.com/theos/theos.git $THEOS
          
      - name: Setup iOS SDK
        run: |
          export THEOS=~/theos
          rm -rf $THEOS/sdks
          git clone --depth 1 https://github.com/theos/sdks.git $THEOS/sdks
          
      - name: Setup Toolchain (Buoc Cuoi Cung)
        run: |
          export THEOS=~/theos
          mkdir -p $THEOS/toolchain/linux/iphone
          # Tai bo bien dich chuẩn cho Linux
          curl -LO https://github.com/theos/toolchain/releases/download/linux-x86_64/toolchain-linux-x86_64.tar.gz
          tar -xf toolchain-linux-x86_64.tar.gz -C $THEOS/toolchain/linux/iphone
          
      - name: Compile Tweak
        run: |
          export THEOS=~/theos
          make package
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hack-FF-Thanh-Pham
          path: packages/*.deb
