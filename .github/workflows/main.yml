name: CI-Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-20.04 # Giữ bản này để chắc chắn có libtinfo5
    steps:
      - uses: actions/checkout@v4 # Sửa lỗi @@v4 thành @v4 chuẩn bài

      - name: Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential perl git curl libtinfo5 libncurses5
          git clone --recursive --depth 1 https://github.com/theos/theos.git ~/theos
          
      - name: SDK_Toolchain
        run: |
          mkdir -p ~/theos/sdks ~/theos/toolchain/linux/iphone
          curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz
          tar -xf iPhoneOS14.5.sdk.tar.xz -C ~/theos/sdks
          curl -L "https://github.com/sbingner/llvm-project/releases/download/v10.0.0-1/linux-ios-arm64e-clang-toolchain.tar.lzma" -o tc.tar.lzma
          tar -xf tc.tar.lzma --strip-components=1 -C ~/theos/toolchain/linux/iphone

      - name: Run_Build
        run: |
          export THEOS=~/theos
          export PATH=$THEOS/toolchain/linux/iphone/bin:$PATH
          make package FINALPACKAGE=1

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Product-Output
          path: packages/*.deb
