name: Build-FakeLag-Pro

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    # Thử đổi sang ubuntu-latest nếu 20.04 đang bị nghẽn
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Quick Setup
        run: |
          sudo apt-get update
          # Cài đúng cái cần thiết thôi cho nhẹ
          sudo apt-get install -y build-essential perl git curl libssl-dev libtinfo5 libncurses5
          
      - name: Setup Theos & SDK
        run: |
          git clone --recursive --depth 1 https://github.com/theos/theos.git ~/theos
          mkdir -p ~/theos/sdks
          curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz
          tar -xf iPhoneOS14.5.sdk.tar.xz -C ~/theos/sdks
          
      - name: Toolchain Setup
        run: |
          mkdir -p ~/theos/toolchain/linux/iphone
          curl -L "https://github.com/sbingner/llvm-project/releases/download/v10.0.0-1/linux-ios-arm64e-clang-toolchain.tar.lzma" -o toolchain.tar.lzma
          tar -xf toolchain.tar.lzma --strip-components=1 -C ~/theos/toolchain/linux/iphone

      - name: Final Build
        run: |
          export THEOS=~/theos
          export PATH=$THEOS/toolchain/linux/iphone/bin:$PATH
          make package FINALPACKAGE=1

      - name: Save File
        uses: actions/upload-artifact@v4
        with:
          name: FakeLag_ThanhPham
          path: packages/*.deb
