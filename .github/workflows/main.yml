name: Build Tweak
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - __name: Checkout
        uses: actions/checkout@v3
      - __name: Prepare Theos
        run: |
          curl -LO https://raw.githubusercontent.com/theos/theos/master/bin/install-theos
          bash install-theos
      - __name: Build .dylib
        run: |
          export THEOS=~/theos
          make package
      - __name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: FakeLag-File
          path: packages/*.deb
