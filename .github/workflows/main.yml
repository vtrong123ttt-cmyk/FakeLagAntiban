name: Build-FF-iOS
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Theos & SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential perl git curl libssl-dev
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          # Tải SDK iOS để nấu file dylib
          curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz
          mkdir -p ~/theos/sdks
          tar -xf iPhoneOS14.5.sdk.tar.xz -C ~/theos/sdks
      - name: Compile
        run: |
          export THEOS=~/theos
          make package
      - name: Save-File
        uses: actions/upload-artifact@v3
        with:
          name: Hack-FF-Thanh-Pham
          path: packages/*.deb
